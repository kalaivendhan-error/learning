<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object Learning</title>
</head>

<body>
    <div class="object-ip">
        <input type="text" id="name" placeholder="name">
        <input type="text" id="nickname" placeholder="nickname">
        <button onclick="fn()">add to object</button>
    </div>

    <script>
        function fn() {
            var user_name = document.querySelector('#name')
            var user_nickname = document.querySelector('#nickname')
            var object = new Object()

            object.name = user_name.value
            object.nickname = user_nickname.value
            console.log(object)

        }

        var object = {
            name: 'kalai',
            age: 20,
            statu: 'studing',
            hobby: ['handball', 'cricket', 'batmiton'],
            good() {
                return 'leadership ability'
            },
            bad(msg) {
                return `no experience as ${msg}`
            }

        }
        object.nickname = 'error'
        console.log(object.bad('developer'))
    </script>
</body>

</html>
